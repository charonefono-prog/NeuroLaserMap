<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a7ea4">
  <meta name="description" content="NeuroMapper - Mapeamento de Neuromodulação">
  <title>NeuroMapper</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #11181c;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      background: white;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 20px;
      background: linear-gradient(135deg, #0a7ea4 0%, #0a5a84 100%);
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .login-logo {
      width: 80px;
      height: 80px;
      background: #0a7ea4;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 20px;
    }

    .login-title {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      color: #0a7ea4;
      margin-bottom: 10px;
    }

    .login-subtitle {
      font-size: 14px;
      color: #687076;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #11181c;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #0a7ea4;
      box-shadow: 0 0 0 3px rgba(10, 126, 164, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #0a7ea4;
      color: white;
    }

    .btn-primary:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* Main App */
    .main-app {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .header {
      background: white;
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #11181c;
    }

    .header-user {
      font-size: 12px;
      color: #687076;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .logout-btn:active {
      opacity: 0.8;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #11181c;
      margin-bottom: 12px;
      margin-top: 20px;
    }

    .patient-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .patient-card:active {
      background: #f5f5f5;
      transform: scale(0.98);
    }

    .patient-name {
      font-size: 16px;
      font-weight: 600;
      color: #11181c;
      margin-bottom: 4px;
    }

    .patient-email {
      font-size: 14px;
      color: #687076;
      margin-bottom: 8px;
    }

    .patient-status {
      display: inline-block;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .status-ativo {
      background: #dcfce7;
      color: #166534;
    }

    .status-pausado {
      background: #fef3c7;
      color: #92400e;
    }

    .add-btn {
      position: fixed;
      bottom: 80px;
      right: 16px;
      width: 56px;
      height: 56px;
      background: #0a7ea4;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(10, 126, 164, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-btn:active {
      transform: scale(0.95);
    }

    .tab-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 8px 0;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 600px;
      margin: 0 auto;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      cursor: pointer;
      color: #687076;
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }

    .tab-item.active {
      color: #0a7ea4;
    }

    .tab-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #687076;
    }

    @media (max-width: 600px) {
      .app {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
      <div class="login-card">
        <div class="login-logo">🧠</div>
        <h1 class="login-title">NeuroMapper</h1>
        <p class="login-subtitle">Mapeamento de Neuromodulação</p>
        
        <div id="loginError" class="error hidden"></div>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>
          
          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
      </div>
    </div>

    <!-- Main App -->
    <div class="main-app hidden" id="mainApp">
      <div class="header">
        <div>
          <div class="header-title">NeuroMapper</div>
          <div class="header-user" id="userEmail"></div>
        </div>
        <button class="logout-btn" id="logoutBtn">Sair</button>
      </div>

      <div class="content" id="content">
        <!-- Home Tab -->
        <div id="homeTab">
          <div class="section-title">Pacientes</div>
          <div id="patientsList"></div>
        </div>

        <!-- Escalas Tab -->
        <div id="escalasTab" class="hidden">
          <div class="section-title">Escalas de Avaliação</div>
          <p class="loading">Carregando escalas...</p>
        </div>

        <!-- Admin Tab -->
        <div id="adminTab" class="hidden">
          <div class="section-title">Administração</div>
          <p class="loading">Painel de administração</p>
        </div>

        <!-- Configurações Tab -->
        <div id="configTab" class="hidden">
          <div class="section-title">Configurações</div>
          <p class="loading">Configurações do aplicativo</p>
        </div>
      </div>

      <button class="add-btn" id="addBtn">+</button>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <a class="tab-item active" data-tab="home">
          <div class="tab-icon">🏠</div>
          <div>Home</div>
        </a>
        <a class="tab-item" data-tab="escalas">
          <div class="tab-icon">📊</div>
          <div>Escalas</div>
        </a>
        <a class="tab-item" data-tab="admin">
          <div class="tab-icon">⚙️</div>
          <div>Admin</div>
        </a>
        <a class="tab-item" data-tab="config">
          <div class="tab-icon">🔧</div>
          <div>Config</div>
        </a>
      </div>
    </div>
  </div>

  <script>
    // Estado da aplicação
    let authToken = localStorage.getItem('authToken');
    let currentUser = localStorage.getItem('currentUser') ? JSON.parse(localStorage.getItem('currentUser')) : null;

    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');
    const patientsList = document.getElementById('patientsList');
    const addBtn = document.getElementById('addBtn');
    const tabItems = document.querySelectorAll('.tab-item');
    const tabs = {
      home: document.getElementById('homeTab'),
      escalas: document.getElementById('escalasTab'),
      admin: document.getElementById('adminTab'),
      config: document.getElementById('configTab')
    };

    // Mostrar tela apropriada
    function showScreen() {
      if (authToken && currentUser) {
        loginScreen.classList.add('hidden');
        mainApp.classList.remove('hidden');
        userEmail.textContent = currentUser.email;
        loadPatients();
      } else {
        loginScreen.classList.remove('hidden');
        mainApp.classList.add('hidden');
      }
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          const data = await response.json();
          loginError.textContent = data.error || 'Erro ao fazer login';
          loginError.classList.remove('hidden');
          return;
        }

        const data = await response.json();
        authToken = data.token;
        currentUser = data.user;

        localStorage.setItem('authToken', authToken);
        localStorage.setItem('currentUser', JSON.stringify(currentUser));

        loginError.classList.add('hidden');
        loginForm.reset();
        showScreen();
      } catch (error) {
        loginError.textContent = 'Erro de conexão';
        loginError.classList.remove('hidden');
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      authToken = null;
      currentUser = null;
      localStorage.removeItem('authToken');
      localStorage.removeItem('currentUser');
      showScreen();
    });

    // Carregar pacientes
    async function loadPatients() {
      try {
        const response = await fetch('/api/patients', {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Erro ao carregar pacientes');

        const data = await response.json();
        displayPatients(data.patients);
      } catch (error) {
        patientsList.innerHTML = '<p class="loading">Erro ao carregar pacientes</p>';
      }
    }

    // Exibir pacientes
    function displayPatients(patients) {
      patientsList.innerHTML = patients.map(p => `
        <div class="patient-card">
          <div class="patient-name">${p.name}</div>
          <div class="patient-email">${p.email}</div>
          <span class="patient-status status-${p.status}">${p.status}</span>
        </div>
      `).join('');
    }

    // Navegação de abas
    tabItems.forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const tabName = item.dataset.tab;

        tabItems.forEach(t => t.classList.remove('active'));
        item.classList.add('active');

        Object.values(tabs).forEach(tab => tab.classList.add('hidden'));
        tabs[tabName].classList.remove('hidden');
      });
    });

    // Botão adicionar
    addBtn.addEventListener('click', () => {
      alert('Funcionalidade de adicionar paciente em desenvolvimento');
    });

    // Inicializar
    showScreen();

    // Service Worker para PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
