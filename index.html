<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLaserMap - Acesso</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0066CC">
    <style>
        :root {
            --primary: #0066CC;
            --bg: #F5F7FA;
            --text: #1A1A1A;
            --muted: #6B7280;
            --white: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { margin-bottom: 10px; color: var(--primary); font-size: 24px; }
        p { color: var(--muted); margin-bottom: 25px; font-size: 14px; line-height: 1.5; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        .hidden { display: none; }
        #status-msg { margin-top: 20px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card" id="auth-card">
        <h1>NeuroLaserMap</h1>
        <p>Solicite acesso para utilizar o sistema de mapeamento de neuromodulação.</p>
        
        <div id="form-container">
            <input type="text" id="name" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="tel" id="phone" placeholder="Telefone / WhatsApp" required>
            <button onclick="handleRequest()">Solicitar Acesso</button>
        </div>

        <div id="pending-container" class="hidden">
            <div style="font-size: 40px; margin-bottom: 15px;">⏳</div>
            <h2 style="font-size: 18px;">Aguardando Aprovação</h2>
            <p>Sua solicitação foi enviada. O administrador irá analisar seu acesso em breve.</p>
            <button onclick="checkStatus()" style="background-color: #6B7280;">Verificar Status</button>
        </div>

        <div id="authorized-container" class="hidden">
            <div style="font-size: 40px; margin-bottom: 15px;">✅</div>
            <h2 style="font-size: 18px;">Acesso Liberado!</h2>
            <p>Você já pode utilizar o sistema NeuroLaserMap.</p>
            <button onclick="enterApp()">Entrar no Sistema</button>
        </div>
    </div>

    <script>
        const AUTH_KEY = 'neurolasermap_auth';
        
        // Verificar status ao carregar
        window.onload = () => {
            const status = localStorage.getItem(AUTH_KEY);
            updateUI(status);
        };

        function updateUI(status) {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('pending-container').classList.add('hidden');
            document.getElementById('authorized-container').classList.add('hidden');

            if (status === 'authorized') {
                document.getElementById('authorized-container').classList.remove('hidden');
            } else if (status === 'pending') {
                document.getElementById('pending-container').classList.remove('hidden');
            } else {
                document.getElementById('form-container').classList.remove('hidden');
            }
        }

        function handleRequest() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            if (!name || !email || !phone) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            // Código mestre para o dono
            if (name.toLowerCase() === 'charone2026') {
                localStorage.setItem(AUTH_KEY, 'authorized');
                updateUI('authorized');
                return;
            }

            // Simular envio
            localStorage.setItem(AUTH_KEY, 'pending');
            localStorage.setItem('user_data', JSON.stringify({name, email, phone}));
            updateUI('pending');
            alert('Solicitação enviada com sucesso!');
        }

        function checkStatus() {
            alert('Sua solicitação ainda está em análise.');
        }

        function enterApp() {
            alert('Bem-vindo ao NeuroLaserMap!');
        }
    </script>
</body>
</html>
